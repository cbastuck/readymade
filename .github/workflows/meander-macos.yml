name: Build Meander macOS

on:
  workflow_run:
    workflows: ["Run Selected CI Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    env:
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite;files,${{ github.workspace }}/.cache/vcpkg/binary,readwrite
      VCPKG_DOWNLOADS: ${{ github.workspace }}/.cache/vcpkg/downloads

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            meander/frontend/package-lock.json
            hkp-frontend/package-lock.json

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31"

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/vcpkg/binary
            .cache/vcpkg/downloads
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('3rdparty/vcpkg.json', '3rdparty/vcpkg-triplets/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [[ "${n}" -ge "${attempts}" ]]; then
                return 1
              fi
              n=$((n + 1))
              sleep $((n * 2))
            done
          }

          mkdir -p .cache/vcpkg/binary .cache/vcpkg/downloads

          vcpkg_baseline="bba8b52f6dea74159bba855ef00376e588d6ea0a"
          if [[ ! -f 3rdparty/vcpkg/scripts/buildsystems/vcpkg.cmake ]]; then
            retry 5 git clone https://github.com/microsoft/vcpkg.git 3rdparty/vcpkg
          fi
          retry 5 git -C 3rdparty/vcpkg fetch origin "${vcpkg_baseline}"
          git -C 3rdparty/vcpkg checkout --force "${vcpkg_baseline}"
          retry 3 ./3rdparty/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Build
        run: ./build.sh Release ON OFF

      - name: Package app bundle
        id: package
        shell: bash
        run: |
          set -euo pipefail
          asset="meander-macos-${{ github.sha }}.zip"
          ditto -c -k --sequesterRsrc --keepParent build/meander/Release/Meander.app "${asset}"
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: meander-macos-${{ github.sha }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 30
