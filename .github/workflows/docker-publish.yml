name: Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - "hkp-rt/**"
      - "3rdparty/**"
      - "Dockerfile.hkp-rt"
      - "Dockerfile.hkp-rt.dockerignore"
  workflow_dispatch:

jobs:
  hkp-rt:
    name: hkp-rt
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push hkp-rt
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hkp-rt
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hkp-rt:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hkp-rt:${{ github.sha }}
          cache-from: type=gha,scope=hkp-rt
          cache-to: type=gha,scope=hkp-rt,mode=max
